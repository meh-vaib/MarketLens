version: "3.9"

services:
  scheduler:
    build: .
    container_name: market-intel-scheduler
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: ["python", "-m", "src.main", "schedule"]

  api:
    build: .
    container_name: market-intel-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: ["python", "-m", "src.main", "serve", "--host", "0.0.0.0", "--port", "8000"]
