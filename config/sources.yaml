# =============================================================================
# GDELT Project queries (free, no API key, ~100k global sources, 15-min refresh)
# Docs: https://blog.gdeltproject.org/gdelt-doc-2-0-api-debuts/
# =============================================================================
gdelt_sources:
  - name: Macro & Monetary Policy
    query: '("interest rate" OR inflation OR CPI OR GDP OR recession OR "Federal Reserve" OR FOMC OR ECB OR "Bank of Japan" OR "central bank" OR "monetary policy")'
    timespan: 24h
    sort: HybridRel
    category: macro
    region: global
    enabled: true

  - name: Geopolitics & Trade
    query: '(sanctions OR tariff OR "trade war" OR OPEC OR "trade deal" OR ceasefire OR conflict OR "diplomatic talks" OR election OR coup)'
    timespan: 24h
    sort: HybridRel
    category: geopolitics
    region: global
    enabled: true

  - name: Markets & Cross-Asset
    query: '("stock market" OR "S&P 500" OR Nasdaq OR "bond yield" OR "Treasury yields" OR commodities OR "oil price" OR Brent OR gold)'
    timespan: 24h
    sort: HybridRel
    category: markets
    region: global
    enabled: true

  - name: Corporate Earnings & M&A
    query: '(earnings OR guidance OR "profit warning" OR merger OR acquisition OR buyback OR IPO OR bankruptcy)'
    timespan: 24h
    sort: HybridRel
    category: equities
    region: global
    enabled: true

  - name: Tech & AI
    query: '(Nvidia OR OpenAI OR Anthropic OR "AI chip" OR semiconductor OR "data center" OR "Big Tech" OR Apple OR Microsoft OR Alphabet)'
    timespan: 24h
    sort: HybridRel
    category: equities
    region: global
    enabled: true

  - name: Energy & Commodities
    query: '("oil supply" OR OPEC OR "crude oil" OR "natural gas" OR "iron ore" OR copper OR lithium OR "energy policy")'
    timespan: 24h
    sort: HybridRel
    category: commodities
    region: global
    enabled: true

  - name: India Markets & Economy
    query: '(Nifty OR Sensex OR NSE OR BSE OR "Reserve Bank of India" OR RBI OR rupee OR SEBI OR "Indian economy" OR "Indian markets" OR "Dalal Street")'
    timespan: 24h
    sort: HybridRel
    category: markets
    region: india
    enabled: true

# Optional REST endpoints (require API keys in .env)
api_sources:
  - name: NewsAPI - Business Headlines
    type: newsapi
    endpoint: https://newsapi.org/v2/top-headlines
    params:
      category: business
      language: en
      pageSize: 30
    api_key_env: NEWSAPI_KEY
    enabled: false
